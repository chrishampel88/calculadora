<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="body">
    <div>Calculadora</div>
    <div class="borderCalcu">

        <div >
            <input type="text" id="resultado">
        </div>
        <div >
            <div class="row fondobtn" >
                <div class="col m2 btn1" onclick='boton(1)'><h5 >1</h5></div>
                <div class="col m2 btn1" onclick='boton(2)'><h5 >2</h5></div>
                <div class="col m2 btn1" onclick='boton(3)'><h5 >3</h5></div>
                <div class="col m2 btn1" onclick='boton("+")'><h5 >+</h5></div>
            </div>
            <div class="row fondobtn">
                <div class="col m2 btn1" onclick='boton(4)'><h5 >4</h5></div>
                <div class="col m2 btn1" onclick='boton(5)'><h5 >5</h5></div>
                <div class="col m2 btn1" onclick='boton(6)'><h5 >6</h5></div>
                <div class="col m2 btn1" onclick='boton("-")'><h5 >-</h5></div>
            </div>
            <div class="row fondobtn">
                <div class="col m2 btn1" onclick='boton(7)'><h5 >7</h5></div>
                <div class="col m2 btn1" onclick='boton(8)'><h5 >8</h5></div>
                <div class="col m2 btn1" onclick='boton(9)'><h5 >9</h5></div>
                <div class="col m2 btn1" onclick='boton("*")'><h5 >x</h5></div>
            </div>
            <div class="row fondobtn">
                <div  class="col m2 btn1" onclick='boton(0)'><h5 >0</h5></div>
                <div  class="col m2 btn1" onclick="calcular('enter')"><h5 >=</h5></div>
                <div  class="col m2 btn1" onclick='boton("/")'><h5 >/</h5></div>
                <div  class="col m2 btn1" onclick="limpiar('limpiar')"><h5 >C</h5></div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
